<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Strength Analyzer | UPE Group 2</title>
   <!-- stylesheet -->
  <link rel="stylesheet" href="UPE-Proj.css">
  <!-- imported font -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
</head>


<body>

<div class="layout">

  <!-- LEFT -->
  <div class="left">
    <div class="title-badge">
      <h1>Password Strength<br>Analyzer</h1>
    </div>

    <div class="form-section">
      <div class="field-group">
        <label>Username</label>
        <input type="text" placeholder="" autocomplete="off" />
      </div>

      <div class="field-group">
        <label>Password</label>
        <input type="password" placeholder="" autocomplete="off" />
      </div>
    </div>

    <div class="strength-section">
      <span class="strength-label">Strength</span>
      <div class="strength-track">
        <div class="strength-fill" style="width: 0%"></div>
      </div>
      <div class="strength-ticks">
        <span class="tick">WEAK</span>
        <span class="tick">FAIR</span>
        <span class="tick">GOOD</span>
        <span class="tick">STRONG</span>
      </div>
    </div>

    <div class="divider"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="panel-section-title">Time to Crack</div>

    <div class="crack-box">
      <span class="crack-value">XXX</span>
    </div>

    <div class="panel-section-title">Analysis</div>
    <ul class="analysis-list">
      <li>XXX</li>
      <li>XXX</li>
      <li>XXX</li>
    </ul>

    <div class="panel-section-title">Suggestions for<br>Improvement</div>
    <div class="suggestions-box">
      <ul class="suggestions-list">
        <li>XXX</li>
        <li>XXX</li>
        <li>XXX</li>
      </ul>
    </div>
  </div>

</div>

</body>
</html>
